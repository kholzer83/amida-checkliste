<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Amida">
  <meta name="theme-color" content="#2563eb">
  <link rel="manifest" href="manifest.json">
  <title>Amida Vermietung</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue: #2563eb;
      --blue-light: #eff6ff;
      --blue-mid: #dbeafe;
      --slate-50: #f8fafc;
      --slate-100: #f1f5f9;
      --slate-200: #e2e8f0;
      --slate-300: #cbd5e1;
      --slate-400: #94a3b8;
      --slate-500: #64748b;
      --slate-600: #475569;
      --slate-700: #334155;
      --slate-800: #1e293b;
      --slate-900: #0f172a;
      --red: #dc2626;
      --amber: #d97706;
      --green: #16a34a;
      --radius: 12px;
      --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
      --shadow-md: 0 4px 6px rgba(0,0,0,.07), 0 2px 4px rgba(0,0,0,.06);
    }

    html { font-size: 16px; -webkit-text-size-adjust: 100%; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--slate-100);
      color: var(--slate-800);
      min-height: 100vh;
      min-height: -webkit-fill-available;
      padding-bottom: env(safe-area-inset-bottom);
    }

    /* ── Header ── */
    .app-header {
      background: var(--blue);
      color: white;
      padding: 16px 20px;
      padding-top: calc(16px + env(safe-area-inset-top));
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .app-header h1 { font-size: 1.2rem; font-weight: 700; letter-spacing: -.01em; }
    .app-header .date { font-size: .85rem; opacity: .85; }
    .back-btn {
      background: rgba(255,255,255,.2);
      border: none;
      color: white;
      font-size: .9rem;
      font-weight: 600;
      padding: 8px 14px;
      border-radius: 8px;
      cursor: pointer;
      min-height: 44px;
      display: flex;
      align-items: center;
      gap: 6px;
      -webkit-tap-highlight-color: transparent;
    }
    .back-btn:active { background: rgba(255,255,255,.35); }

    /* ── Screens ── */
    .screen { display: none; }
    .screen.active { display: block; }

    /* ── Main content wrapper ── */
    .content { padding: 16px; max-width: 640px; margin: 0 auto; }

    /* ── Cards ── */
    .card {
      background: white;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
      margin-bottom: 12px;
    }
    .card-title {
      font-size: .8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--slate-500);
      margin-bottom: 12px;
    }

    /* ── Termine block ── */
    .termine-list { list-style: none; }
    .termine-list li {
      display: flex;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid var(--slate-100);
      font-size: .9rem;
      align-items: flex-start;
    }
    .termine-list li:last-child { border-bottom: none; }
    .termin-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--blue);
      flex-shrink: 0;
      margin-top: 5px;
    }
    .termin-prop {
      font-size: .75rem;
      color: var(--slate-400);
      font-weight: 600;
    }
    .no-termine { color: var(--slate-400); font-size: .9rem; font-style: italic; }

    /* ── Property cards on dashboard ── */
    .property-card {
      background: white;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
      margin-bottom: 12px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: box-shadow .15s;
      border: 1.5px solid transparent;
    }
    .property-card:active { box-shadow: var(--shadow-md); border-color: var(--blue-mid); }
    .property-card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 10px;
    }
    .property-address {
      font-weight: 700;
      font-size: .95rem;
      color: var(--slate-800);
      line-height: 1.3;
    }
    .urgency-badge {
      font-size: 1.1rem;
      flex-shrink: 0;
      line-height: 1;
    }

    /* ── Progress bar ── */
    .progress-wrap { margin: 10px 0; }
    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: .78rem;
      color: var(--slate-500);
      margin-bottom: 5px;
    }
    .progress-bar {
      height: 6px;
      background: var(--slate-200);
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--blue);
      border-radius: 3px;
      transition: width .3s ease;
    }

    .next-step {
      font-size: .88rem;
      font-weight: 700;
      color: var(--blue);
      margin-top: 8px;
    }

    /* ── Detail view ── */
    .detail-meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 0;
    }
    .meta-item label {
      display: block;
      font-size: .72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--slate-400);
      margin-bottom: 3px;
    }
    .meta-item span {
      font-size: .9rem;
      font-weight: 600;
      color: var(--slate-700);
    }

    .note-area {
      width: 100%;
      border: 1.5px solid var(--slate-200);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: .9rem;
      font-family: inherit;
      color: var(--slate-700);
      resize: vertical;
      min-height: 80px;
      background: var(--slate-50);
      transition: border-color .15s;
    }
    .note-area:focus { outline: none; border-color: var(--blue); background: white; }

    /* ── Termine in detail ── */
    .termin-row {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 8px 0;
      border-bottom: 1px solid var(--slate-100);
    }
    .termin-row:last-of-type { border-bottom: none; }
    .termin-row span { flex: 1; font-size: .9rem; color: var(--slate-700); }
    .del-btn {
      background: none;
      border: none;
      color: var(--slate-400);
      font-size: 1.1rem;
      cursor: pointer;
      min-width: 32px;
      min-height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
    }
    .del-btn:active { background: var(--slate-100); color: var(--red); }

    .termin-inputs {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    .termin-input-datum {
      width: 130px;
      flex-shrink: 0;
    }
    .termin-input-desc { flex: 1; min-width: 150px; }
    .termin-inputs input {
      border: 1.5px solid var(--slate-200);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: .88rem;
      font-family: inherit;
      color: var(--slate-700);
      background: var(--slate-50);
      width: 100%;
      transition: border-color .15s;
    }
    .termin-inputs input:focus { outline: none; border-color: var(--blue); background: white; }
    .add-btn {
      background: var(--blue);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px 16px;
      font-size: .88rem;
      font-weight: 600;
      cursor: pointer;
      min-height: 44px;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
    }
    .add-btn:active { background: #1d4ed8; }

    /* ── Checklist steps ── */
    .step-list { list-style: none; }
    .step-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--slate-100);
    }
    .step-item:last-child { border-bottom: none; }

    .step-checkbox {
      width: 22px;
      height: 22px;
      border: 2px solid var(--slate-300);
      border-radius: 6px;
      flex-shrink: 0;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
      background: white;
      position: relative;
      margin-top: 1px;
      transition: border-color .15s, background .15s;
    }
    .step-checkbox:checked {
      background: var(--blue);
      border-color: var(--blue);
    }
    .step-checkbox:checked::after {
      content: '';
      position: absolute;
      left: 5px;
      top: 2px;
      width: 6px;
      height: 10px;
      border: 2px solid white;
      border-top: none;
      border-left: none;
      transform: rotate(45deg);
    }

    .step-body { flex: 1; min-width: 0; }
    .step-name {
      font-size: .92rem;
      color: var(--slate-700);
      line-height: 1.4;
    }
    .step-item.done .step-name {
      text-decoration: line-through;
      color: var(--slate-400);
    }
    .step-item.active .step-name {
      font-weight: 700;
      color: var(--blue);
    }
    .step-num {
      font-size: .72rem;
      font-weight: 700;
      color: var(--slate-400);
      margin-bottom: 1px;
    }
    .step-item.active .step-num { color: var(--blue); }
    .step-ts {
      font-size: .72rem;
      color: var(--slate-400);
      margin-top: 3px;
      display: none;
    }
    .step-item.done .step-ts { display: block; }

    .active-pill {
      display: inline-block;
      background: var(--blue-light);
      color: var(--blue);
      font-size: .7rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
      margin-left: 6px;
      vertical-align: middle;
    }

    /* ── Reset button ── */
    .reset-btn {
      width: 100%;
      background: none;
      border: 1.5px solid var(--slate-200);
      color: var(--slate-400);
      border-radius: 8px;
      padding: 12px;
      font-size: .88rem;
      cursor: pointer;
      margin-top: 4px;
      -webkit-tap-highlight-color: transparent;
      transition: border-color .15s, color .15s;
    }
    .reset-btn:active { border-color: var(--red); color: var(--red); }

    /* ── Section label ── */
    .section-label {
      font-size: .8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--slate-500);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* ── Urgency text ── */
    .urgency-text {
      font-size: .78rem;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 20px;
    }
    .urgency-red { background: #fef2f2; color: var(--red); }
    .urgency-amber { background: #fffbeb; color: var(--amber); }
    .urgency-green { background: #f0fdf4; color: var(--green); }

    .detail-header-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 4px;
    }
    .detail-address {
      font-size: 1rem;
      font-weight: 700;
      color: var(--slate-800);
      line-height: 1.3;
      flex: 1;
    }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: calc(24px + env(safe-area-inset-bottom));
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--slate-800);
      color: white;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: .88rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s, transform .2s;
      z-index: 200;
      white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Scrollable ── */
    #screen-detail { padding-bottom: 32px; }
  </style>
</head>
<body>

<!-- ══ SCREEN: DASHBOARD ══ -->
<div id="screen-dashboard" class="screen active">
  <header class="app-header">
    <div>
      <h1>Amida Vermietung</h1>
      <div class="date" id="header-date"></div>
    </div>
  </header>
  <div class="content">
    <div class="card" id="termine-block">
      <div class="card-title">📅 Nächste Termine</div>
      <ul class="termine-list" id="dashboard-termine"></ul>
    </div>
    <div id="property-cards"></div>
  </div>
</div>

<!-- ══ SCREEN: DETAIL ══ -->
<div id="screen-detail" class="screen">
  <header class="app-header">
    <button class="back-btn" onclick="showDashboard()">← Übersicht</button>
    <div class="date" id="detail-header-date"></div>
  </header>
  <div class="content">

    <!-- Meta info -->
    <div class="card" id="detail-meta-card">
      <div class="detail-header-row">
        <div class="detail-address" id="detail-address"></div>
        <span class="urgency-text" id="detail-urgency-badge"></span>
      </div>
      <div class="progress-wrap" style="margin-top:10px;">
        <div class="progress-label">
          <span id="detail-progress-text"></span>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="detail-progress-fill"></div></div>
      </div>
      <div class="detail-meta" style="margin-top:12px;">
        <div class="meta-item">
          <label>Mietende aktuell</label>
          <span id="detail-mietende"></span>
        </div>
        <div class="meta-item">
          <label>Vermietungsziel</label>
          <span id="detail-ziel"></span>
        </div>
      </div>
    </div>

    <!-- Notiz -->
    <div class="card">
      <div class="section-label">✏️ Notiz</div>
      <textarea class="note-area" id="detail-note" placeholder="Notizen zur Wohnung…"></textarea>
    </div>

    <!-- Termine -->
    <div class="card">
      <div class="section-label">📅 Termine</div>
      <div id="detail-termine-list"></div>
      <div class="termin-inputs">
        <div class="termin-input-datum">
          <input type="text" id="termin-datum" placeholder="Datum (z.B. Di 26.05.)">
        </div>
        <div class="termin-input-desc">
          <input type="text" id="termin-desc" placeholder="Beschreibung">
        </div>
        <button class="add-btn" onclick="addTermin()">+ Hinzufügen</button>
      </div>
    </div>

    <!-- Checklist -->
    <div class="card">
      <div class="section-label">✅ Prozessschritte</div>
      <ul class="step-list" id="detail-steps"></ul>
    </div>

    <!-- Reset -->
    <div class="card">
      <button class="reset-btn" onclick="resetProperty()">Fortschritt zurücksetzen</button>
    </div>

  </div>
</div>

<div id="toast"></div>

<script>
'use strict';

// ── Constants ──────────────────────────────────────────────────────────────
const STORAGE_KEY = 'amida-checkliste-v1';
const STEPS = [
  'Inserat erstellen',
  'Inserat schalten',
  'Termine mit aktuellen Mietern koordinieren',
  'Termine mit Interessenten koordinieren',
  'Mietanbot erstellen',
  'Mietanbot übermitteln',
  'Mietanbot prüfen',
  'Mietanbot freigeben',
  'Mietvertrag erstellen / versenden',
  'Mietvertrag unterfertigen',
  'Rücknahme Altmieter koordinieren',
  'Übergabe neuer Mieter koordinieren'
];

// ── Default data ───────────────────────────────────────────────────────────
function defaultState() {
  return {
    properties: [
      {
        id: 'p1',
        address: '1020 Wien, Zirkusgasse 11 Top 3',
        mietende: '30.06.2026',
        ziel: '01.07.2026',
        note: 'Mietanbot erhalten – prüfen & freigeben.',
        termine: ['Mi 27.05. – Rückstellungsvorbesprechung Mieter & Eigentümer'],
        steps: [
          { done: true,  ts: '01.05.2026 09:00' },
          { done: true,  ts: '03.05.2026 10:30' },
          { done: true,  ts: '05.05.2026 14:00' },
          { done: true,  ts: '10.05.2026 11:00' },
          { done: true,  ts: '15.05.2026 09:30' },
          { done: true,  ts: '20.05.2026 16:00' },
          { done: false, ts: '' },
          { done: false, ts: '' },
          { done: false, ts: '' },
          { done: false, ts: '' },
          { done: false, ts: '' },
          { done: false, ts: '' }
        ]
      },
      {
        id: 'p2',
        address: '1020 Wien, Staudiglgasse 11 Top 4',
        mietende: '30.06.2026',
        ziel: '01.07.2026',
        note: 'Besichtigungen laufen. Rückgabe Altmieter koordinieren.',
        termine: ['Di 26.05. 17:30–18:00 – Besichtigungen'],
        steps: [
          { done: true,  ts: '01.05.2026 09:00' },
          { done: true,  ts: '03.05.2026 10:30' },
          { done: true,  ts: '08.05.2026 11:00' },
          { done: true,  ts: '10.05.2026 14:00' },
          { done: false, ts: '' },
          { done: false, ts: '' },
          { done: false, ts: '' },
          { done: false, ts: '' },
          { done: false, ts: '' },
          { done: false, ts: '' },
          { done: false, ts: '' },
          { done: false, ts: '' }
        ]
      },
      {
        id: 'p3',
        address: '1180 Wien, Staudgasse 10 Top 2',
        mietende: 'unbekannt',
        ziel: '01.08.2026',
        note: 'Inserat erstellen. Kontakt mit aktuellen Mietern für Besichtigungen ab Juni.',
        termine: [],
        steps: Array.from({length: 12}, () => ({ done: false, ts: '' }))
      },
      {
        id: 'p4',
        address: '1120 Wien, Hetzendorferstraße 155 Top 16',
        mietende: 'unbekannt',
        ziel: '01.09.2026',
        note: 'Inserat erstellen. Kontakt mit aktuellen Mietern für Besichtigungen ab Juni.',
        termine: [],
        steps: Array.from({length: 12}, () => ({ done: false, ts: '' }))
      }
    ]
  };
}

// ── State ──────────────────────────────────────────────────────────────────
let state;
let currentPropId = null;

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      state = JSON.parse(raw);
      // Ensure all properties have 12 steps
      state.properties.forEach(p => {
        while (p.steps.length < 12) p.steps.push({ done: false, ts: '' });
      });
    } else {
      state = defaultState();
      saveState();
    }
  } catch(e) {
    state = defaultState();
    saveState();
  }
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

// ── Helpers ────────────────────────────────────────────────────────────────
function todayStr() {
  const d = new Date();
  const dd = String(d.getDate()).padStart(2,'0');
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const yyyy = d.getFullYear();
  return `${dd}.${mm}.${yyyy}`;
}

function nowTs() {
  const d = new Date();
  const dd = String(d.getDate()).padStart(2,'0');
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const yyyy = d.getFullYear();
  const hh = String(d.getHours()).padStart(2,'0');
  const min = String(d.getMinutes()).padStart(2,'0');
  return `${dd}.${mm}.${yyyy} ${hh}:${min}`;
}

function parseDateDE(str) {
  // Parse DD.MM.YYYY
  const parts = str.trim().split('.');
  if (parts.length === 3) {
    return new Date(parseInt(parts[2]), parseInt(parts[1])-1, parseInt(parts[0]));
  }
  return null;
}

function daysUntil(dateStr) {
  const d = parseDateDE(dateStr);
  if (!d) return null;
  const today = new Date();
  today.setHours(0,0,0,0);
  d.setHours(0,0,0,0);
  return Math.round((d - today) / 86400000);
}

function urgencyFor(p) {
  const days = daysUntil(p.ziel);
  if (days === null) return { emoji: '🟢', cls: 'urgency-green', label: 'Kein Datum' };
  if (days < 30)  return { emoji: '🔴', cls: 'urgency-red',   label: `${days}d` };
  if (days < 60)  return { emoji: '🟡', cls: 'urgency-amber', label: `${days}d` };
  return { emoji: '🟢', cls: 'urgency-green', label: `${days}d` };
}

function countDone(p) {
  return p.steps.filter(s => s.done).length;
}

function nextStepIndex(p) {
  return p.steps.findIndex(s => !s.done);
}

function shortAddress(addr) {
  // e.g. "1020 Wien, Zirkusgasse 11 Top 3" → "Zirkusgasse 11/3"
  const m = addr.match(/,\s*(.+?)\s+(\d+)\s+Top\s+(\d+)/i);
  if (m) return `${m[1]} ${m[2]}/T${m[3]}`;
  return addr.split(',')[1]?.trim() || addr;
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

function getProp(id) {
  return state.properties.find(p => p.id === id);
}

// ── Navigation ─────────────────────────────────────────────────────────────
function showDashboard() {
  document.getElementById('screen-dashboard').classList.add('active');
  document.getElementById('screen-detail').classList.remove('active');
  renderDashboard();
  window.scrollTo(0, 0);
}

function showDetail(propId) {
  currentPropId = propId;
  document.getElementById('screen-dashboard').classList.remove('active');
  document.getElementById('screen-detail').classList.add('active');
  renderDetail(propId);
  window.scrollTo(0, 0);
}

// ── Dashboard render ───────────────────────────────────────────────────────
function renderDashboard() {
  document.getElementById('header-date').textContent = todayStr();

  // Collect & sort all termine
  const allTermine = [];
  state.properties.forEach(p => {
    p.termine.forEach(t => {
      allTermine.push({ text: t, propShort: shortAddress(p.address), propId: p.id });
    });
  });

  const ul = document.getElementById('dashboard-termine');
  ul.innerHTML = '';
  if (allTermine.length === 0) {
    ul.innerHTML = '<li class="no-termine">Keine anstehenden Termine</li>';
  } else {
    allTermine.forEach(t => {
      const li = document.createElement('li');
      li.innerHTML = `
        <span class="termin-dot"></span>
        <div>
          <div class="termin-prop">${escHtml(t.propShort)}</div>
          <div>${escHtml(t.text)}</div>
        </div>
      `;
      ul.appendChild(li);
    });
  }

  // Property cards
  const container = document.getElementById('property-cards');
  container.innerHTML = '';
  state.properties.forEach(p => {
    const done = countDone(p);
    const nextIdx = nextStepIndex(p);
    const nextName = nextIdx >= 0 ? STEPS[nextIdx] : 'Alle Schritte erledigt ✓';
    const urg = urgencyFor(p);
    const pct = Math.round((done / 12) * 100);

    const card = document.createElement('div');
    card.className = 'property-card';
    card.onclick = () => showDetail(p.id);
    card.innerHTML = `
      <div class="property-card-header">
        <div class="property-address">${escHtml(p.address)}</div>
        <span class="urgency-badge" title="Vermietungsziel: ${escHtml(p.ziel)}">${urg.emoji}</span>
      </div>
      <div class="progress-wrap">
        <div class="progress-label">
          <span>${done}/12 Schritte</span>
          <span>${pct}%</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      </div>
      <div class="next-step">→ ${escHtml(nextName)}</div>
    `;
    container.appendChild(card);
  });
}

// ── Detail render ──────────────────────────────────────────────────────────
function renderDetail(propId) {
  const p = getProp(propId);
  document.getElementById('detail-header-date').textContent = todayStr();
  document.getElementById('detail-address').textContent = p.address;
  document.getElementById('detail-mietende').textContent = p.mietende;
  document.getElementById('detail-ziel').textContent = p.ziel;

  const urg = urgencyFor(p);
  const badge = document.getElementById('detail-urgency-badge');
  badge.textContent = `${urg.emoji} ${urg.label}`;
  badge.className = `urgency-text ${urg.cls}`;

  const done = countDone(p);
  const pct = Math.round((done / 12) * 100);
  document.getElementById('detail-progress-text').textContent = `${done}/12 Schritte abgeschlossen`;
  document.getElementById('detail-progress-fill').style.width = pct + '%';

  // Note
  const noteEl = document.getElementById('detail-note');
  noteEl.value = p.note || '';
  noteEl.onblur = () => {
    p.note = noteEl.value;
    saveState();
  };

  // Termine
  renderDetailTermine(p);

  // Steps
  renderDetailSteps(p);
}

function renderDetailTermine(p) {
  const container = document.getElementById('detail-termine-list');
  container.innerHTML = '';
  if (p.termine.length === 0) {
    container.innerHTML = '<div class="no-termine" style="padding:4px 0 8px;">Keine Termine eingetragen</div>';
  } else {
    p.termine.forEach((t, i) => {
      const row = document.createElement('div');
      row.className = 'termin-row';
      row.innerHTML = `
        <span>${escHtml(t)}</span>
        <button class="del-btn" onclick="deleteTermin(${i})" title="Löschen">×</button>
      `;
      container.appendChild(row);
    });
  }
  // Clear inputs
  document.getElementById('termin-datum').value = '';
  document.getElementById('termin-desc').value = '';
}

function renderDetailSteps(p) {
  const ul = document.getElementById('detail-steps');
  ul.innerHTML = '';
  const nextIdx = nextStepIndex(p);

  p.steps.forEach((s, i) => {
    const isActive = !s.done && i === nextIdx;
    const li = document.createElement('li');
    li.className = `step-item${s.done ? ' done' : ''}${isActive ? ' active' : ''}`;
    li.innerHTML = `
      <input type="checkbox" class="step-checkbox" id="step-${i}" ${s.done ? 'checked' : ''}>
      <div class="step-body">
        <div class="step-num">Schritt ${i+1}${isActive ? '<span class="active-pill">Aktuell</span>' : ''}</div>
        <div class="step-name">${escHtml(STEPS[i])}</div>
        <div class="step-ts">${s.ts ? `✓ Erledigt am ${escHtml(s.ts)}` : ''}</div>
      </div>
    `;
    const cb = li.querySelector('.step-checkbox');
    cb.onchange = () => toggleStep(i, cb.checked);
    ul.appendChild(li);
  });
}

// ── Actions ────────────────────────────────────────────────────────────────
function toggleStep(idx, checked) {
  const p = getProp(currentPropId);
  p.steps[idx].done = checked;
  p.steps[idx].ts = checked ? nowTs() : '';
  saveState();
  renderDetail(currentPropId);
  // Also refresh progress on dashboard (background)
}

function addTermin() {
  const datum = document.getElementById('termin-datum').value.trim();
  const desc = document.getElementById('termin-desc').value.trim();
  if (!datum && !desc) { showToast('Bitte Datum und Beschreibung eingeben'); return; }
  const text = datum && desc ? `${datum} – ${desc}` : datum || desc;
  const p = getProp(currentPropId);
  p.termine.push(text);
  saveState();
  renderDetailTermine(p);
  showToast('Termin hinzugefügt');
}

function deleteTermin(idx) {
  const p = getProp(currentPropId);
  p.termine.splice(idx, 1);
  saveState();
  renderDetailTermine(p);
}

function resetProperty() {
  const p = getProp(currentPropId);
  if (!confirm(`Alle Schritte für "${p.address}" zurücksetzen?\nDieser Vorgang kann nicht rückgängig gemacht werden.`)) return;
  p.steps = Array.from({length: 12}, () => ({ done: false, ts: '' }));
  saveState();
  renderDetail(currentPropId);
  showToast('Fortschritt zurückgesetzt');
}

// ── Enter on termin inputs ─────────────────────────────────────────────────
document.getElementById('termin-desc').addEventListener('keydown', e => {
  if (e.key === 'Enter') addTermin();
});

// ── Security: HTML escape ──────────────────────────────────────────────────
function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// ── Boot ───────────────────────────────────────────────────────────────────
loadState();
renderDashboard();
</script>
</body>
</html>
